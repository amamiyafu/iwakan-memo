<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6eadb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="アルコール量メモ">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>アルコール量メモ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="./icon.png">
  <style>
    :root {
      --bg: #fff7e8;
      --bg-soft: #fffaf2;
      --card: #fffdf8;
      --card-warm: #fff1dc;
      --line: #ead9c4;
      --line-strong: #d7b895;
      --text: #2f2924;
      --muted: #7a6b5f;
      --main: #b87445;
      --main-dark: #93552f;
      --main-soft: #f3dcc7;
      --accent: #8b5a3c;
      --danger: #b45b4d;
      --danger-soft: #f7e2dc;
      --shadow: 0 12px 26px rgba(132, 83, 42, 0.11);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
    }

    body {
      width: 100%;
      min-width: 0;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 238, 204, 0.78), transparent 34rem),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 44%, #f9ecd9 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    button,
    input,
    select {
      max-width: 100%;
      font: inherit;
      font-size: 16px;
    }

    input,
    select,
    button {
      -webkit-tap-highlight-color: transparent;
    }

    input[type="date"],
    input[type="number"],
    input[type="text"],
    select {
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 50px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      background: #fffefa;
      box-sizing: border-box;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="date"]:focus,
    input[type="number"]:focus,
    input[type="text"]:focus,
    select:focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 4px rgba(184, 116, 69, 0.16);
    }

    input[type="file"] {
      width: 100%;
      min-height: 48px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 10px;
      background: var(--bg-soft);
      color: var(--muted);
    }

    .app {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: calc(18px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
    }

    header {
      padding: 8px 2px 16px;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 6px;
      font-size: 28px;
      line-height: 1.22;
      letter-spacing: 0;
    }

    h2 {
      margin-bottom: 14px;
      font-size: 20px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    h3 {
      margin-bottom: 8px;
      font-size: 17px;
      line-height: 1.4;
      letter-spacing: 0;
    }

    .lead {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      width: 100%;
      margin: 0 0 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .backup-card {
      display: grid;
      gap: 0;
      margin-bottom: 16px;
      padding: 18px 20px;
      background: rgba(255, 253, 248, 0.86);
      box-shadow: 0 8px 18px rgba(132, 83, 42, 0.08);
    }

    .backup-card h2 {
      margin-bottom: 8px;
      font-size: 17px;
      line-height: 1.35;
    }

    .backup-card .guide {
      margin-bottom: 15px;
      font-size: 13px;
    }

    .backup-actions {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
      align-items: center;
      width: 100%;
      max-width: 340px;
    }

    .backup-status {
      min-height: 0;
      margin: 10px 0 0;
      font-size: 13px;
    }

    .backup-status:empty {
      display: none;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      min-width: 0;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .select-wrap {
      position: relative;
      width: 100%;
    }

    .select-wrap::after {
      position: absolute;
      top: 50%;
      right: 14px;
      width: 9px;
      height: 9px;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      content: "";
      pointer-events: none;
      transform: translateY(-65%) rotate(45deg);
    }

    .select-wrap select {
      padding-right: 42px;
    }

    .form-grid.two {
      display: grid;
      gap: 14px;
    }

    .result-box {
      display: grid;
      gap: 8px;
      margin-top: 4px;
      border-radius: 8px;
      padding: 18px;
      background: linear-gradient(135deg, var(--card-warm), var(--bg-soft));
      border: 1px solid var(--line);
    }

    .result-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .result-value {
      font-size: 38px;
      font-weight: 900;
      line-height: 1.1;
      color: var(--accent);
      letter-spacing: 0;
    }

    .result-value small {
      font-size: 22px;
    }

    .summary-grid {
      display: grid;
      gap: 12px;
    }

    .summary-panel {
      display: grid;
      gap: 8px;
      border-radius: 8px;
      padding: 18px;
      background: linear-gradient(135deg, var(--card-warm), #fff8ed);
      border: 1px solid var(--line);
    }

    .summary-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .summary-value {
      font-size: 34px;
      font-weight: 900;
      line-height: 1.1;
      color: var(--accent);
      letter-spacing: 0;
    }

    .guide {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    button {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 18px;
      padding: 13px 16px;
      color: #fff;
      background: var(--main);
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 8px 16px rgba(147, 85, 47, 0.16);
    }

    button:hover,
    button:active {
      background: var(--main-dark);
      transform: translateY(1px);
    }

    button.secondary {
      border: 1px solid var(--line-strong);
      color: var(--accent);
      background: var(--main-soft);
      box-shadow: none;
    }

    button.secondary:hover,
    button.secondary:active {
      color: var(--accent);
      background: #ead0b8;
    }

    .backup-action {
      display: flex;
      flex: 1 1 132px;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-width: 0;
      height: 42px;
      min-height: 42px;
      margin: 0;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      padding: 0 14px;
      box-sizing: border-box;
      color: var(--accent);
      background: var(--main-soft);
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      box-shadow: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      appearance: none;
    }

    .backup-action:hover,
    .backup-action:active {
      color: var(--accent);
      background: #ead0b8;
      transform: translateY(1px);
    }

    .backup-action input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      min-height: 0;
      margin: -1px;
      border: 0;
      padding: 0;
      overflow: hidden;
      opacity: 0;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .backup-action:focus-within {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 4px rgba(184, 116, 69, 0.14);
    }

    button.danger {
      border: 1px solid #e4b9ae;
      color: var(--danger);
      background: var(--danger-soft);
      box-shadow: none;
    }

    button.danger:hover,
    button.danger:active {
      color: #9d4b40;
      background: #efd1c9;
    }

    .form-actions,
    .record-actions {
      display: grid;
      gap: 10px;
    }

    .form-actions {
      grid-template-columns: 1fr;
    }

    .record-actions {
      grid-template-columns: 1fr 1fr;
    }

    .record-list,
    .history-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .section-title-row,
    .history-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      min-width: 0;
    }

    .section-title-row {
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin-bottom: 0;
    }

    .history-date-summary {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .add-date-button {
      width: auto;
      min-width: 112px;
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--accent);
      background: #fff6e9;
      box-shadow: none;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.2;
      white-space: nowrap;
    }

    .add-date-button:hover,
    .add-date-button:active {
      color: var(--accent);
      background: var(--main-soft);
    }

    .record-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--bg-soft);
    }

    .record-main {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 800;
    }

    .record-item button {
      width: auto;
      min-width: 64px;
      min-height: 40px;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 14px;
    }

    .history-item {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--bg-soft);
    }

    .history-date {
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .history-total {
      color: var(--accent);
      font-weight: 900;
    }

    .history-detail {
      display: grid;
      gap: 4px;
      margin: 0;
      padding: 0;
      color: var(--muted);
      font-size: 14px;
      list-style: none;
    }

    .empty {
      margin: 0;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 14px;
      color: var(--muted);
      background: var(--bg-soft);
      text-align: center;
    }

    .status {
      min-height: 24px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: var(--accent);
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 620px) {
      .form-grid.two,
      .summary-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 430px) {
      .app {
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        padding: 15px;
      }

      .record-item {
        grid-template-columns: 1fr;
      }

      .record-item button {
        width: 100%;
      }

      .section-title-row,
      .history-card-head {
        align-items: stretch;
        flex-direction: column;
      }

      .add-date-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>アルコール量メモ</h1>
      <p class="lead">飲んだ量から純アルコール量を計算し記録します。</p>
    </header>

    <section class="card backup-card" aria-labelledby="backupTitle">
      <div class="backup-head">
        <h2 id="backupTitle">バックアップ</h2>
        <p class="guide">記録を保存したり復元できます。<br>大切な記録がなくならないように、定期的に保存をお願いします。</p>
      </div>
      <div class="backup-actions">
        <button id="exportJson" type="button" class="secondary backup-action">保存</button>
        <label class="secondary backup-action" for="importJson">
          復元
          <input id="importJson" type="file" accept="application/json,.json">
        </label>
      </div>
      <p id="backupStatus" class="status backup-status" aria-live="polite"></p>
    </section>

    <section class="card" aria-labelledby="inputTitle">
      <h2 id="inputTitle">飲んだお酒</h2>
      <div class="form-grid">
        <div class="field">
          <label for="recordDate">記録日</label>
          <input id="recordDate" type="date">
        </div>

        <div class="field">
          <label for="drinkType">お酒の種類</label>
          <div class="select-wrap">
            <select id="drinkType">
              <option value="ビール">ビール</option>
              <option value="日本酒">日本酒</option>
              <option value="赤ワイン">赤ワイン</option>
              <option value="白ワイン">白ワイン</option>
              <option value="ロゼワイン">ロゼワイン</option>
              <option value="スパークリングワイン">スパークリングワイン</option>
              <option value="焼酎">焼酎</option>
              <option value="ウイスキー">ウイスキー</option>
              <option value="ハイボール">ハイボール</option>
              <option value="チューハイ">チューハイ</option>
              <option value="梅酒">梅酒</option>
              <option value="その他">その他</option>
            </select>
          </div>
        </div>

        <div id="customNameField" class="field hidden">
          <label for="customName">お酒の名前</label>
          <input id="customName" type="text" inputmode="text" autocomplete="off" placeholder="例：カクテル">
        </div>

        <div class="form-grid two">
          <div class="field">
            <label for="volumeMl">飲んだ量（ml）</label>
            <input id="volumeMl" type="number" inputmode="decimal" min="0" step="1" placeholder="例：350">
          </div>
          <div class="field">
            <label for="alcoholPercent">アルコール度数（%）</label>
            <input id="alcoholPercent" type="number" inputmode="decimal" min="0" max="100" step="0.1" placeholder="例：5">
          </div>
        </div>

        <div class="result-box" aria-live="polite">
          <div class="result-label">純アルコール量</div>
          <div class="result-value"><span id="calculatedAlcohol">0.0</span><small>g</small></div>
        </div>

        <div class="form-actions">
          <button id="saveRecord" type="button">記録する</button>
          <button id="cancelEdit" type="button" class="secondary hidden">キャンセル</button>
        </div>
        <p id="saveStatus" class="status" aria-live="polite"></p>
      </div>
    </section>

    <section class="card" aria-labelledby="todayTitle">
      <h2 id="todayTitle">今日の合計</h2>
      <div class="summary-panel" aria-live="polite">
        <div class="summary-value"><span id="todayTotal">0.0</span>g</div>
      </div>
    </section>

    <section class="card" aria-labelledby="averageTitle">
      <h2 id="averageTitle">平均純アルコール量</h2>
      <div class="summary-grid" aria-live="polite">
        <div class="summary-panel">
          <div class="summary-label">過去7日平均</div>
          <div class="summary-value"><span id="average7">0.0</span>g</div>
        </div>
        <div class="summary-panel">
          <div class="summary-label">過去30日平均</div>
          <div class="summary-value"><span id="average30">0.0</span>g</div>
        </div>
      </div>
    </section>

    <section class="card" aria-labelledby="todayRecordsTitle">
      <div class="section-title-row">
        <h2 id="todayRecordsTitle">今日の記録</h2>
        <button id="addTodayDate" type="button" class="add-date-button">この日に追加</button>
      </div>
      <ul id="todayRecords" class="record-list"></ul>
      <p id="todayEmpty" class="empty hidden">今日の記録はまだありません。</p>
    </section>

    <section class="card" aria-labelledby="historyTitle">
      <h2 id="historyTitle">履歴</h2>
      <ul id="historyList" class="history-list"></ul>
      <p id="historyEmpty" class="empty hidden">記録はまだありません。</p>
    </section>

  </main>

  <script>
    (function () {
      "use strict";

      var RECORDS_KEY = "alcoholMemoRecords";
      var SETTINGS_KEY = "alcoholMemoSettings";
      var STORAGE_VERSION = 2;

      var drinkDefaults = {
        "ビール": 5,
        "日本酒": 15,
        "赤ワイン": 13,
        "白ワイン": 12,
        "ロゼワイン": 12,
        "スパークリングワイン": 11,
        "焼酎": 25,
        "ウイスキー": 40,
        "ハイボール": 7,
        "チューハイ": 7,
        "梅酒": 12,
        "その他": ""
      };

      var elements = {
        recordDate: document.getElementById("recordDate"),
        drinkType: document.getElementById("drinkType"),
        customNameField: document.getElementById("customNameField"),
        customName: document.getElementById("customName"),
        volumeMl: document.getElementById("volumeMl"),
        alcoholPercent: document.getElementById("alcoholPercent"),
        calculatedAlcohol: document.getElementById("calculatedAlcohol"),
        saveRecord: document.getElementById("saveRecord"),
        cancelEdit: document.getElementById("cancelEdit"),
        saveStatus: document.getElementById("saveStatus"),
        todayTotal: document.getElementById("todayTotal"),
        average7: document.getElementById("average7"),
        average30: document.getElementById("average30"),
        todayRecords: document.getElementById("todayRecords"),
        todayEmpty: document.getElementById("todayEmpty"),
        addTodayDate: document.getElementById("addTodayDate"),
        historyList: document.getElementById("historyList"),
        historyEmpty: document.getElementById("historyEmpty"),
        exportJson: document.getElementById("exportJson"),
        importJson: document.getElementById("importJson"),
        backupStatus: document.getElementById("backupStatus")
      };

      var state = {
        records: readRecords(),
        settings: readSettings(),
        userEditedPercent: false,
        editingId: null
      };

      function readJson(key, fallback) {
        var raw = localStorage.getItem(key);
        if (!raw) {
          return fallback;
        }
        try {
          return JSON.parse(raw);
        } catch (error) {
          return fallback;
        }
      }

      function readRecords() {
        var data = readJson(RECORDS_KEY, []);
        if (!Array.isArray(data)) {
          return [];
        }
        return data.filter(function (record) {
          return record && typeof record === "object" && !Array.isArray(record);
        }).map(ensureRecordId);
      }

      function readSettings() {
        var data = readJson(SETTINGS_KEY, {});
        if (!data || typeof data !== "object" || Array.isArray(data)) {
          data = {};
        }
        data.version = STORAGE_VERSION;
        return data;
      }

      function saveRecords() {
        localStorage.setItem(RECORDS_KEY, JSON.stringify(state.records));
      }

      function saveSettings() {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
      }

      function ensureRecordId(record) {
        if (typeof record.id === "string" && record.id) {
          return record;
        }
        var copy = Object.assign({}, record);
        copy.id = createId();
        return copy;
      }

      function createId() {
        if (window.crypto && window.crypto.randomUUID) {
          return window.crypto.randomUUID();
        }
        return "record-" + Date.now() + "-" + Math.random().toString(36).slice(2);
      }

      function todayString() {
        var now = new Date();
        return formatDateLocal(now);
      }

      function formatDateLocal(date) {
        var year = date.getFullYear();
        var month = String(date.getMonth() + 1).padStart(2, "0");
        var day = String(date.getDate()).padStart(2, "0");
        return year + "-" + month + "-" + day;
      }

      function isDateString(value) {
        return typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value);
      }

      function dateFromUnknown(value) {
        if (!value) {
          return "";
        }
        if (isDateString(value)) {
          return value;
        }
        if (typeof value === "number" && value > 0 && value < 1000000000000) {
          value = value * 1000;
        }
        var parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) {
          return "";
        }
        return formatDateLocal(parsed);
      }

      function recordDate(record) {
        return dateFromUnknown(record.date) ||
          dateFromUnknown(record.createdAt) ||
          dateFromUnknown(record.timestamp) ||
          todayString();
      }

      function recordAlcoholType(record) {
        return stringValue(record.alcoholType) ||
          stringValue(record.drinkType) ||
          stringValue(record.type) ||
          "その他";
      }

      function recordCustomName(record) {
        return stringValue(record.customAlcoholName) ||
          stringValue(record.customName) ||
          stringValue(record.name);
      }

      function recordVolume(record) {
        return numberValue(record.volumeMl, record.amountMl, record.volume, record.ml);
      }

      function recordPercent(record) {
        return numberValue(record.alcoholPercent, record.percent, record.abv);
      }

      function recordPureAlcohol(record) {
        var saved = numberValue(record.pureAlcoholGrams, record.pureAlcoholG, record.pureAlcohol, record.grams);
        if (saved > 0 || hasAnyNumber(record.pureAlcoholGrams, record.pureAlcoholG, record.pureAlcohol, record.grams)) {
          return roundOne(saved);
        }
        return roundOne(recordVolume(record) * recordPercent(record) / 100 * 0.8);
      }

      function stringValue() {
        for (var i = 0; i < arguments.length; i += 1) {
          if (typeof arguments[i] === "string" && arguments[i].trim()) {
            return arguments[i].trim();
          }
        }
        return "";
      }

      function numberValue() {
        for (var i = 0; i < arguments.length; i += 1) {
          var value = Number(arguments[i]);
          if (Number.isFinite(value)) {
            return value;
          }
        }
        return 0;
      }

      function hasAnyNumber() {
        for (var i = 0; i < arguments.length; i += 1) {
          if (Number.isFinite(Number(arguments[i]))) {
            return true;
          }
        }
        return false;
      }

      function roundOne(value) {
        return Math.round((Number(value) || 0) * 10) / 10;
      }

      function formatOne(value) {
        return roundOne(value).toFixed(1);
      }

      function getCurrentPureAlcohol() {
        var amount = Number(elements.volumeMl.value);
        var percent = Number(elements.alcoholPercent.value);
        if (!Number.isFinite(amount) || !Number.isFinite(percent) || amount <= 0 || percent < 0) {
          return 0;
        }
        return roundOne(amount * percent / 100 * 0.8);
      }

      function updateDrinkDefaults() {
        var type = elements.drinkType.value;
        elements.customNameField.classList.toggle("hidden", type !== "その他");
        if (!state.userEditedPercent || type !== "その他") {
          elements.alcoholPercent.value = drinkDefaults[type];
          state.userEditedPercent = false;
        }
        if (type !== "その他") {
          elements.customName.value = "";
        }
        updateCalculation();
      }

      function updateCalculation() {
        elements.calculatedAlcohol.textContent = formatOne(getCurrentPureAlcohol());
      }

      function resetForm(clearStatus, dateOverride) {
        var today = todayString();
        state.editingId = null;
        state.userEditedPercent = false;
        elements.recordDate.value = dateOverride || today;
        elements.recordDate.max = today;
        elements.drinkType.value = "ビール";
        elements.customName.value = "";
        elements.customNameField.classList.add("hidden");
        elements.volumeMl.value = "";
        elements.alcoholPercent.value = drinkDefaults["ビール"];
        elements.saveRecord.textContent = "記録する";
        elements.cancelEdit.classList.add("hidden");
        if (clearStatus) {
          setStatus(elements.saveStatus, "", "");
        }
        updateCalculation();
      }

      function scrollToInputCard() {
        document.getElementById("inputTitle").scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function startAddForDate(date) {
        resetForm(true, date);
        setStatus(elements.saveStatus, "この日付に追加できます。", "ok");
        scrollToInputCard();
      }

      function startEdit(recordId) {
        var record = state.records.find(function (item) {
          return item.id === recordId;
        });
        if (!record) {
          setStatus(elements.saveStatus, "編集する記録が見つかりません。", "error");
          return;
        }

        var type = recordAlcoholType(record);
        var customName = recordCustomName(record);
        var isDefaultType = Object.prototype.hasOwnProperty.call(drinkDefaults, type);

        state.editingId = record.id;
        state.userEditedPercent = true;
        elements.recordDate.value = recordDate(record);
        elements.recordDate.max = todayString();
        elements.drinkType.value = isDefaultType ? type : "その他";
        elements.customNameField.classList.toggle("hidden", elements.drinkType.value !== "その他");
        elements.customName.value = elements.drinkType.value === "その他" ? (customName || (isDefaultType ? "" : type)) : customName;
        elements.volumeMl.value = recordVolume(record) || "";
        elements.alcoholPercent.value = recordPercent(record) || "";
        elements.saveRecord.textContent = "更新する";
        elements.cancelEdit.classList.remove("hidden");
        setStatus(elements.saveStatus, "記録を編集中です。", "ok");
        updateCalculation();
        scrollToInputCard();
      }

      function formValues() {
        return {
          date: elements.recordDate.value,
          alcoholType: elements.drinkType.value,
          customAlcoholName: elements.customName.value.trim(),
          volumeMl: Number(elements.volumeMl.value),
          alcoholPercent: Number(elements.alcoholPercent.value),
          pureAlcoholGrams: getCurrentPureAlcohol()
        };
      }

      function validateForm(values) {
        var today = todayString();

        if (!isDateString(values.date)) {
          setStatus(elements.saveStatus, "記録日を選択してください。", "error");
          elements.recordDate.focus();
          return false;
        }

        if (values.date > today) {
          setStatus(elements.saveStatus, "未来の日付は選択できません。", "error");
          elements.recordDate.focus();
          return false;
        }

        if (values.alcoholType === "その他" && !values.customAlcoholName) {
          setStatus(elements.saveStatus, "その他の場合は、お酒の名前を入力してください。", "error");
          elements.customName.focus();
          return false;
        }

        if (!Number.isFinite(values.volumeMl) || values.volumeMl <= 0) {
          setStatus(elements.saveStatus, "飲んだ量をmlで入力してください。", "error");
          elements.volumeMl.focus();
          return false;
        }

        if (!Number.isFinite(values.alcoholPercent) || values.alcoholPercent < 0 || values.alcoholPercent > 100) {
          setStatus(elements.saveStatus, "アルコール度数は0〜100の範囲で入力してください。", "error");
          elements.alcoholPercent.focus();
          return false;
        }

        return true;
      }

      function displayName(record) {
        var type = recordAlcoholType(record);
        var customName = recordCustomName(record);
        if (type === "その他" && customName) {
          return customName;
        }
        return type;
      }

      function recordLine(record) {
        return displayName(record) + " " +
          recordVolume(record) + "ml / " +
          recordPercent(record) + "% / " +
          formatOne(recordPureAlcohol(record)) + "g";
      }

      function recordsForDate(date) {
        return state.records.filter(function (record) {
          return recordDate(record) === date;
        });
      }

      function sumRecords(records) {
        return roundOne(records.reduce(function (sum, record) {
          return sum + recordPureAlcohol(record);
        }, 0));
      }

      function dateNDaysAgo(daysAgo) {
        var date = new Date();
        date.setDate(date.getDate() - daysAgo);
        return formatDateLocal(date);
      }

      function averageForDays(days) {
        var total = 0;
        for (var i = 0; i < days; i += 1) {
          total += sumRecords(recordsForDate(dateNDaysAgo(i)));
        }
        return roundOne(total / days);
      }

      function updateSummaries() {
        elements.todayTotal.textContent = formatOne(sumRecords(recordsForDate(todayString())));
        elements.average7.textContent = formatOne(averageForDays(7));
        elements.average30.textContent = formatOne(averageForDays(30));
      }

      function renderTodayRecords() {
        var records = recordsForDate(todayString());
        elements.todayRecords.innerHTML = "";
        elements.todayEmpty.classList.toggle("hidden", records.length > 0);

        records.forEach(function (record) {
          var item = document.createElement("li");
          item.className = "record-item";

          var main = document.createElement("div");
          main.className = "record-main";
          main.textContent = recordLine(record);

          item.appendChild(main);
          item.appendChild(createRecordActions(record));
          elements.todayRecords.appendChild(item);
        });
      }

      function createRecordActions(record) {
        var actions = document.createElement("div");
        actions.className = "record-actions";

        var editButton = document.createElement("button");
        editButton.type = "button";
        editButton.className = "secondary";
        editButton.textContent = "編集";
        editButton.addEventListener("click", function () {
          startEdit(record.id);
        });

        var deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "danger";
        deleteButton.textContent = "削除";
        deleteButton.addEventListener("click", function () {
          deleteRecord(record.id);
        });

        actions.appendChild(editButton);
        actions.appendChild(deleteButton);
        return actions;
      }

      function renderHistory() {
        var grouped = {};
        state.records.forEach(function (record) {
          var date = recordDate(record);
          if (!grouped[date]) {
            grouped[date] = [];
          }
          grouped[date].push(record);
        });

        var dates = Object.keys(grouped).sort(function (a, b) {
          return b.localeCompare(a);
        });

        elements.historyList.innerHTML = "";
        elements.historyEmpty.classList.toggle("hidden", dates.length > 0);

        dates.forEach(function (date) {
          var records = grouped[date];
          var item = document.createElement("li");
          item.className = "history-item";

          var head = document.createElement("div");
          head.className = "history-card-head";

          var summary = document.createElement("div");
          summary.className = "history-date-summary";

          var dateLine = document.createElement("div");
          dateLine.className = "history-date";
          dateLine.textContent = date;

          var totalLine = document.createElement("div");
          totalLine.className = "history-total";
          totalLine.textContent = "合計 " + formatOne(sumRecords(records)) + "g";

          var addButton = document.createElement("button");
          addButton.type = "button";
          addButton.className = "add-date-button";
          addButton.textContent = "この日に追加";
          addButton.addEventListener("click", function () {
            startAddForDate(date);
          });

          summary.appendChild(dateLine);
          summary.appendChild(totalLine);
          head.appendChild(summary);
          head.appendChild(addButton);

          var detail = document.createElement("ul");
          detail.className = "history-detail";
          records.forEach(function (record) {
            var line = document.createElement("li");
            line.className = "record-item";

            var main = document.createElement("div");
            main.className = "record-main";
            main.textContent = recordLine(record);

            line.appendChild(main);
            line.appendChild(createRecordActions(record));
            detail.appendChild(line);
          });

          item.appendChild(head);
          item.appendChild(detail);
          elements.historyList.appendChild(item);
        });
      }

      function renderAll() {
        updateCalculation();
        updateSummaries();
        renderTodayRecords();
        renderHistory();
      }

      function setStatus(element, message, type) {
        element.textContent = message;
        element.classList.remove("error", "ok");
        if (type) {
          element.classList.add(type);
        }
      }

      function saveRecord() {
        var values = formValues();
        if (!validateForm(values)) {
          return;
        }

        if (state.editingId) {
          updateRecord(values);
          return;
        }

        state.records.push(Object.assign({ id: createId() }, values));
        saveRecords();
        setStatus(elements.saveStatus, "記録しました。", "ok");
        resetForm(false);
        renderAll();
      }

      function updateRecord(values) {
        var index = state.records.findIndex(function (record) {
          return record.id === state.editingId;
        });
        if (index === -1) {
          setStatus(elements.saveStatus, "更新する記録が見つかりません。", "error");
          return;
        }

        state.records[index] = Object.assign({}, state.records[index], values);
        saveRecords();
        setStatus(elements.saveStatus, "更新しました。", "ok");
        resetForm(false);
        renderAll();
      }

      function deleteRecord(id) {
        if (!confirm("この記録を削除しますか？")) {
          return;
        }
        state.records = state.records.filter(function (record) {
          return record.id !== id;
        });
        saveRecords();
        renderAll();
      }

      function exportBackup() {
        var backup = {
          appName: "アルコール量メモ",
          schemaVersion: STORAGE_VERSION,
          exportedAt: new Date().toISOString(),
          keys: {
            records: RECORDS_KEY,
            settings: SETTINGS_KEY
          },
          records: state.records,
          settings: state.settings
        };

        var blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.href = url;
        link.download = "alcohol-memo-backup-" + todayString() + ".json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setStatus(elements.backupStatus, "データを保存しました。", "ok");
      }

      function validateImportData(data) {
        var records;
        var settings;

        if (Array.isArray(data)) {
          records = data;
          settings = state.settings;
        } else if (data && typeof data === "object") {
          records = data.records;
          settings = data.settings || state.settings;
        }

        if (!Array.isArray(records)) {
          throw new Error("recordsが見つかりません。");
        }

        records.forEach(function (record) {
          if (!record || typeof record !== "object" || Array.isArray(record)) {
            throw new Error("記録データの形式が正しくありません。");
          }
        });

        if (!settings || typeof settings !== "object" || Array.isArray(settings)) {
          settings = state.settings;
        }
        settings.version = STORAGE_VERSION;

        return {
          records: records.map(ensureRecordId),
          settings: settings
        };
      }

      function importBackup(file) {
        if (!file) {
          return;
        }

        var reader = new FileReader();
        reader.onload = function () {
          try {
            var data = JSON.parse(String(reader.result || ""));
            var imported = validateImportData(data);
            var message = "現在の記録と設定を、選択したファイルの内容で復元します。よろしいですか？";
            if (!confirm(message)) {
              elements.importJson.value = "";
              setStatus(elements.backupStatus, "復元を取り消しました。", "");
              return;
            }
            localStorage.setItem(RECORDS_KEY, JSON.stringify(imported.records));
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(imported.settings));
            setStatus(elements.backupStatus, "復元しました。画面を更新します。", "ok");
            window.setTimeout(function () {
              window.location.reload();
            }, 350);
          } catch (error) {
            elements.importJson.value = "";
            setStatus(elements.backupStatus, "不正なファイルです。JSONの内容を確認してください。", "error");
          }
        };
        reader.onerror = function () {
          elements.importJson.value = "";
          setStatus(elements.backupStatus, "ファイルを読み込めませんでした。", "error");
        };
        reader.readAsText(file);
      }

      function initialize() {
        saveSettings();
        resetForm(true);

        elements.recordDate.addEventListener("change", function () {
          if (elements.recordDate.value > todayString()) {
            elements.recordDate.value = todayString();
          }
        });
        elements.drinkType.addEventListener("change", updateDrinkDefaults);
        elements.volumeMl.addEventListener("input", updateCalculation);
        elements.alcoholPercent.addEventListener("input", function () {
          state.userEditedPercent = true;
          updateCalculation();
        });
        elements.saveRecord.addEventListener("click", saveRecord);
        elements.cancelEdit.addEventListener("click", function () {
          resetForm(true);
        });
        elements.addTodayDate.addEventListener("click", function () {
          startAddForDate(todayString());
        });
        elements.exportJson.addEventListener("click", exportBackup);
        elements.importJson.addEventListener("change", function (event) {
          importBackup(event.target.files && event.target.files[0]);
        });

        renderAll();

        if ("serviceWorker" in navigator) {
          window.addEventListener("load", function () {
            navigator.serviceWorker.register("sw.js").then(function (registration) {
              registration.update();
            }).catch(function () {});
          });
        }
      }

      initialize();
    })();
  </script>
</body>
</html>
